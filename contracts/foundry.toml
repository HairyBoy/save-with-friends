[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200

[fuzz]
seed = "0x5742460f" # fixed seed so fuzz/invariant failures reproduce

[invariant]
runs = 128
depth = 64
fail_on_revert = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
